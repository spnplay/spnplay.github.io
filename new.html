<script>
/* ═══════════════════════════════════════════════════════════════════════════
   SPN PLAY — Hyper-Compatible Multi-Engine Playback Core

   KEY BEHAVIOUR:
   • HTTP streams on an HTTPS page are blocked by browsers as "mixed content".
     We detect this automatically and ALWAYS route them through a CORS/HTTPS
     proxy — no toggle, no user action required.
   • Every stream type runs a full engine cascade. If engine N fails the next
     one is tried automatically until one works or VLC fallback is shown.

   CASCADE PER TYPE:
     HLS  → hls.js (direct) → hls.js+proxy → Shaka → native → Shaka+proxy → VLC
     DASH → Shaka (direct)  → Shaka+proxy  → native → VLC
     TS   → mpegts.js → mpegts.js+proxy → native → VLC
     FLV  → mpegts.js → VLC
     MP4  → native → native+proxy → VLC
     RTSP/MMS → VLC only (browsers cannot play these)
   ═══════════════════════════════════════════════════════════════════════════ */

// ── DOM refs ─────────────────────────────────────────────────────────────────
const mainGrid      = document.getElementById('mainGrid');
const sidebarPanel  = document.getElementById('sidebarPanel');
const playerPanel   = document.getElementById('playerPanel');
const moveTrigger   = document.getElementById('moveTrigger');
const castDeviceBtn = document.getElementById('castDeviceBtn');
const vlcFallback   = document.getElementById('vlcFallback');
const vlcLaunchLink = document.getElementById('vlcLaunchLink');
const countryInput  = document.getElementById('countryInput');
const loadCountryBtn= document.getElementById('loadCountryBtn');
const statusEl      = document.getElementById('status');
const channelListEl = document.getElementById('channelList');
const videoEl       = document.getElementById('video');
const nowPlayingText= document.getElementById('nowPlayingText');
const liveDot       = document.getElementById('liveDot');
const engineBadge   = document.getElementById('engineBadge');
const engineOverlay = document.getElementById('engineOverlay');
const overlayEngine = document.getElementById('overlayEngine');
const overlayMsg    = document.getElementById('overlayMsg');
const searchInput   = document.getElementById('searchInput');

// ── State ─────────────────────────────────────────────────────────────────────
let channels        = [];
let filteredChannels= [];
let activeIndex     = -1;
let currentUrl      = '';
let retryTimer      = null;
let retryCount      = 0;
const MAX_RETRIES   = 2;

let hlsInstance   = null;
let shakaInstance = null;
let mpegtsPlayer  = null;

// ── CORS proxy pool ───────────────────────────────────────────────────────────
// All are HTTPS so they also fix HTTP→HTTPS mixed-content blocks.
// We cycle through all of them automatically — no user toggle needed.
const PROXIES = [
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u => `https://thingproxy.freeboard.io/fetch/${u}`,
  u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
];

// Detect if the page is on HTTPS but the stream is HTTP (mixed content = blocked)
function isMixedContent(url) {
  return location.protocol === 'https:' && url.toLowerCase().startsWith('http:');
}

// Return the best URL to use: proxied if blocked, original otherwise
// pIdx = which proxy to use (0 = first attempt)
function resolveUrl(url, pIdx) {
  if (isMixedContent(url) || pIdx > 0) {
    // Always proxy mixed-content; also proxy on retry attempts
    const fn = PROXIES[(pIdx) % PROXIES.length];
    return fn(url);
  }
  return url;
}

// ── Utility ───────────────────────────────────────────────────────────────────
function setStatus(msg)  { statusEl.textContent = msg; }
function setDot(state)   { liveDot.className = 'live-dot ' + (state || ''); }
function setEngine(name) {
  engineBadge.textContent = name;
  engineBadge.style.display = name ? 'inline-block' : 'none';
}
function showOverlay(engine, msg) {
  overlayEngine.textContent = engine;
  overlayMsg.textContent    = msg;
  engineOverlay.classList.add('show');
}
function hideOverlay() { engineOverlay.classList.remove('show'); }

function detectStreamType(url) {
  const u = (url || '').toLowerCase().split('?')[0];
  if (u.startsWith('rtsp://') || u.startsWith('mms://') || u.startsWith('rtmp://')) return 'unsupported';
  if (u.endsWith('.mpd') || u.includes('/dash/') || u.includes('manifest.mpd'))      return 'dash';
  if (u.endsWith('.m3u8') || u.includes('.m3u8') || u.includes('/hls/'))             return 'hls';
  if (u.endsWith('.flv')  || u.includes('.flv?'))                                    return 'flv';
  if (u.endsWith('.ts')   || u.endsWith('.mts'))                                     return 'ts';
  if (u.endsWith('.mp4')  || u.endsWith('.webm') || u.endsWith('.ogg'))              return 'mp4';
  if (u.includes('/live/') || u.includes('/stream/') || u.includes('playlist'))      return 'hls';
  return 'hls'; // IPTV default
}

// ── Engine teardown ───────────────────────────────────────────────────────────
function destroyAllEngines() {
  clearTimeout(retryTimer);
  if (hlsInstance)   { try { hlsInstance.destroy();  } catch(e){} hlsInstance  = null; }
  if (shakaInstance) { try { shakaInstance.destroy(); } catch(e){} shakaInstance= null; }
  if (mpegtsPlayer)  { try { mpegtsPlayer.destroy();  } catch(e){} mpegtsPlayer = null; }
  try { videoEl.pause(); } catch(e){}
  videoEl.removeAttribute('src');
  videoEl.load();
}

// ── Main play entry point ─────────────────────────────────────────────────────
function playChannel(index) {
  const ch = filteredChannels[index];
  if (!ch) return;
  activeIndex = index;
  currentUrl  = ch.url;
  retryCount  = 0;
  renderChannels(filteredChannels);
  nowPlayingText.textContent = ch.name;
  setDot('loading');
  setEngine('');
  setStatus('Connecting…');
  vlcFallback.style.display = 'none';
  updateURL(ch);
  destroyAllEngines();
  startCascade(ch.url);
}

// startCascade builds a sequential list of attempts and runs them one by one.
// Each attempt is { label, fn(url, onSuccess, onFail) }.
function startCascade(rawUrl) {
  hideOverlay();
  const type = detectStreamType(rawUrl);

  if (type === 'unsupported') return triggerVLCFallback(rawUrl);

  // Build attempt list
  const attempts = buildAttempts(rawUrl, type);
  let idx = 0;

  function next() {
    if (idx >= attempts.length) return triggerVLCFallback(rawUrl);
    const attempt = attempts[idx++];
    showOverlay(attempt.label, attempt.msg || 'Trying…');
    setEngine(attempt.label);
    setDot('loading');
    attempt.run(next);
  }

  next();
}

function buildAttempts(rawUrl, type) {
  const list = [];
  const mixed = isMixedContent(rawUrl);

  if (type === 'hls') {
    // 1. hls.js direct (skip if mixed content — would fail immediately)
    if (!mixed) list.push(hlsAttempt(rawUrl, 'hls.js'));
    // 2. hls.js through each proxy
    PROXIES.forEach((fn, i) => list.push(hlsAttempt(fn(rawUrl), `Proxy${i+1}+hls.js`)));
    // 3. Shaka direct
    if (!mixed) list.push(shakaAttempt(rawUrl, 'Shaka'));
    // 4. Shaka through proxy
    list.push(shakaAttempt(PROXIES[0](rawUrl), 'Proxy+Shaka'));
    // 5. Native (only useful on Safari)
    if (!mixed) list.push(nativeAttempt(rawUrl, 'Native'));

  } else if (type === 'dash') {
    if (!mixed) list.push(shakaAttempt(rawUrl, 'Shaka/DASH'));
    PROXIES.forEach((fn, i) => list.push(shakaAttempt(fn(rawUrl), `Proxy${i+1}+Shaka`)));
    if (!mixed) list.push(nativeAttempt(rawUrl, 'Native'));

  } else if (type === 'flv' || type === 'ts') {
    if (!mixed) list.push(mpegtsAttempt(rawUrl, type, 'mpegts.js'));
    list.push(mpegtsAttempt(PROXIES[0](rawUrl), type, 'Proxy+mpegts.js'));
    if (!mixed) list.push(nativeAttempt(rawUrl, 'Native'));

  } else if (type === 'mp4') {
    if (!mixed) list.push(nativeAttempt(rawUrl, 'Native'));
    list.push(nativeAttempt(PROXIES[0](rawUrl), 'Proxy+Native'));
  }

  return list;
}

// ── Attempt factories ─────────────────────────────────────────────────────────

function hlsAttempt(url, label) {
  return {
    label,
    msg: `Trying ${label}…`,
    run(onFail) {
      if (!Hls.isSupported()) return onFail();
      destroyEngineOnly();
      hlsInstance = new Hls({
        enableWorker: true,
        lowLatencyMode: true,
        backBufferLength: 30,
        maxBufferLength: 30,
        maxMaxBufferLength: 60,
        fragLoadingMaxRetry: 2,
        manifestLoadingMaxRetry: 2,
        levelLoadingMaxRetry: 2,
        fragLoadingTimeOut: 10000,
        manifestLoadingTimeOut: 10000,
        xhrSetup(xhr) { xhr.withCredentials = false; },
      });
      hlsInstance.loadSource(url);
      hlsInstance.attachMedia(videoEl);

      let done = false;
      hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
        done = true;
        hideOverlay(); setDot(''); setEngine(label);
        setStatus(`Playing · ${label}`);
        videoEl.play().catch(() => {});
      });
      hlsInstance.on(Hls.Events.ERROR, (e, data) => {
        if (done || !data.fatal) return;
        hlsInstance.destroy(); hlsInstance = null;
        onFail();
      });
    }
  };
}

function shakaAttempt(url, label) {
  return {
    label,
    msg: `Trying ${label}…`,
    run(onFail) {
      if (typeof shaka === 'undefined' || !shaka.Player.isBrowserSupported()) return onFail();
      destroyEngineOnly();
      shakaInstance = new shaka.Player(videoEl);
      shakaInstance.configure({
        streaming: {
          retryParameters: { maxAttempts: 3, baseDelay: 500, backoffFactor: 2, fuzzFactor: 0.5, timeout: 10000 },
          bufferingGoal: 30, rebufferingGoal: 2, bufferBehind: 30,
          ignoreTextStreamFailures: true,
        },
        abr: { enabled: true },
      });
      shakaInstance.getNetworkingEngine().registerRequestFilter((type, req) => {
        req.allowCrossSiteCredentials = false;
      });
      let done = false;
      shakaInstance.addEventListener('error', () => {
        if (done) return;
        shakaInstance.destroy(); shakaInstance = null; onFail();
      });
      shakaInstance.load(url).then(() => {
        done = true;
        hideOverlay(); setDot(''); setEngine(label); setStatus(`Playing · ${label}`);
        videoEl.play().catch(() => {});
      }).catch(() => {
        if (done) return;
        if (shakaInstance) { shakaInstance.destroy(); shakaInstance = null; }
        onFail();
      });
    }
  };
}

function mpegtsAttempt(url, type, label) {
  return {
    label,
    msg: `Trying ${label}…`,
    run(onFail) {
      if (typeof mpegts === 'undefined' || !mpegts.isSupported()) return onFail();
      destroyEngineOnly();
      const mediaType = type === 'flv' ? mpegts.SupportedType.FLV : mpegts.SupportedType.MPEG_TS;
      mpegtsPlayer = mpegts.createPlayer({
        type: mediaType, url, isLive: true,
        enableWorker: true, enableStashBuffer: false, stashInitialSize: 128,
        deferLoadAfterSourceOpen: false,
      });
      mpegtsPlayer.attachMediaElement(videoEl);
      mpegtsPlayer.load();
      let done = false;
      mpegtsPlayer.on(mpegts.Events.ERROR, () => {
        if (done) return;
        mpegtsPlayer.destroy(); mpegtsPlayer = null; onFail();
      });
      videoEl.play().then(() => {
        done = true;
        hideOverlay(); setDot(''); setEngine(label); setStatus(`Playing · ${label}`);
      }).catch(() => {});
      // give it 8s to start before moving on
      setTimeout(() => {
        if (!done && videoEl.readyState < 2) { onFail(); }
      }, 8000);
    }
  };
}

function nativeAttempt(url, label) {
  return {
    label,
    msg: `Trying ${label}…`,
    run(onFail) {
      destroyEngineOnly();
      videoEl.src = url;
      videoEl.load();
      let done = false;
      const onErr = () => { if (!done) onFail(); };
      videoEl.addEventListener('error', onErr, { once: true });
      videoEl.play().then(() => {
        done = true;
        videoEl.removeEventListener('error', onErr);
        hideOverlay(); setDot(''); setEngine(label); setStatus(`Playing · ${label}`);
      }).catch(() => { if (!done) onFail(); });
    }
  };
}

// Destroy only the active engine instance (not video src) — used between attempts
function destroyEngineOnly() {
  if (hlsInstance)   { try { hlsInstance.destroy();  } catch(e){} hlsInstance  = null; }
  if (shakaInstance) { try { shakaInstance.destroy(); } catch(e){} shakaInstance= null; }
  if (mpegtsPlayer)  { try { mpegtsPlayer.destroy();  } catch(e){} mpegtsPlayer = null; }
}

// ── VLC fallback ──────────────────────────────────────────────────────────────
function triggerVLCFallback(url) {
  hideOverlay();
  setDot('error');
  setEngine('');
  const reason = isMixedContent(url)
    ? 'HTTP stream blocked by browser (mixed content) — all proxies failed.'
    : 'All engines exhausted. Stream may require VLC.';
  setStatus(reason);
  vlcLaunchLink.href = 'vlc://' + url;
  vlcFallback.style.display = 'flex';
}

// ── Auto-reconnect on stall ───────────────────────────────────────────────────
videoEl.addEventListener('playing', () => {
  hideOverlay(); setDot(''); clearTimeout(retryTimer); retryCount = 0;
});
videoEl.addEventListener('waiting', () => {
  setDot('loading');
  clearTimeout(retryTimer);
  retryTimer = setTimeout(() => {
    if (videoEl.readyState < 3 && retryCount < MAX_RETRIES && currentUrl) {
      retryCount++;
      setStatus(`Stall — reconnecting (${retryCount}/${MAX_RETRIES})…`);
      destroyAllEngines();
      startCascade(currentUrl);
    }
  }, 10000);
});
videoEl.addEventListener('error', () => clearTimeout(retryTimer));

// ── Channel list & parsing ────────────────────────────────────────────────────
function guessTypeBadge(url) {
  const t = detectStreamType(url);
  const map = { hls:'hls', dash:'dash', ts:'ts', flv:'flv', mp4:'mp4' };
  return map[t] || 'hls';
}

function renderChannels(list) {
  channelListEl.innerHTML = '';
  list.forEach((ch, i) => {
    const div = document.createElement('div');
    const badge = guessTypeBadge(ch.url);
    div.className = 'channel-item' + (i === activeIndex ? ' active' : '');
    div.innerHTML =
      `<div class="ch-info"><strong>${ch.name}</strong><br><small>${ch.group}</small></div>` +
      `<span class="ch-badge badge-${badge}">${badge.toUpperCase()}</span>`;
    div.onclick = () => playChannel(i);
    channelListEl.appendChild(div);
  });
}

function parseM3U(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  const result = [];
  let current = null;
  for (const line of lines) {
    if (line.startsWith('#EXTINF:')) {
      const afterTag    = line.substring(8);
      const commaIdx    = afterTag.indexOf(',');
      const metaPart    = commaIdx >= 0 ? afterTag.substring(0, commaIdx) : afterTag;
      const name        = commaIdx >= 0 ? afterTag.substring(commaIdx + 1).trim() : '';
      const meta        = {};
      const attrRx      = /([a-zA-Z0-9_-]+?)="(.*?)"/g;
      let m;
      while ((m = attrRx.exec(metaPart)) !== null) meta[m[1]] = m[2];
      current = {
        name:  name || meta['tvg-name'] || 'Unknown Channel',
        group: meta['group-title'] || 'General',
        url:   '',
      };
    } else if (line.startsWith('#EXTVLCOPT:') || line.startsWith('#KODIPROP:')) {
      // skip option lines but keep current
    } else if (!line.startsWith('#') && current) {
      current.url = line;
      if (current.url) result.push(current);
      current = null;
    }
  }
  return result;
}

// ── Country loading ───────────────────────────────────────────────────────────
let countryFiles = {};

async function loadCountryList() {
  try {
    const res  = await fetch('https://api.github.com/repos/iptv-org/iptv/contents/streams');
    const data = await res.json();
    data.forEach(f => {
      if (f.name.endsWith('.m3u')) countryFiles[f.name.replace('.m3u','').toLowerCase()] = f.name.replace('.m3u','');
    });
    setStatus('Index loaded. Enter a country code.');
  } catch {
    setStatus('Index unavailable — type a code anyway (e.g. us).');
  }
}

async function loadCountry() {
  const input = countryInput.value.trim().toLowerCase();
  if (!input) return setStatus('Enter a country code first.');
  const code  = countryFiles[input] ||
                Object.keys(countryFiles).find(c => c.startsWith(input)) ||
                input; // try raw input even if not in index

  setStatus('Fetching channel list…');
  try {
    const res  = await fetch(`https://raw.githubusercontent.com/iptv-org/iptv/master/streams/${code}.m3u`);
    if (!res.ok) throw new Error('Not found');
    const text = await res.text();
    channels         = parseM3U(text);
    filteredChannels = channels.slice();
    activeIndex      = -1;
    renderChannels(filteredChannels);
    setStatus(`Loaded ${channels.length} channels for "${code}".`);
  } catch {
    setStatus(`Could not load "${code}" — check the code and try again.`);
  }
}

loadCountryBtn.onclick = loadCountry;
countryInput.addEventListener('keydown', e => { if (e.key === 'Enter') loadCountry(); });

searchInput.oninput = () => {
  const q        = searchInput.value.toLowerCase();
  filteredChannels = q ? channels.filter(c => c.name.toLowerCase().includes(q) || c.group.toLowerCase().includes(q))
                       : channels.slice();
  activeIndex    = -1;
  renderChannels(filteredChannels);
};

// ── URL deep-link ─────────────────────────────────────────────────────────────
function updateURL(ch) {
  const p = new URLSearchParams(window.location.search);
  p.set('ch',   encodeURIComponent(ch.url));
  p.set('name', encodeURIComponent(ch.name));
  history.replaceState(null, '', '?' + p.toString());
}

function restoreFromURL() {
  const p    = new URLSearchParams(window.location.search);
  const url  = p.get('ch')   ? decodeURIComponent(p.get('ch'))   : null;
  const name = p.get('name') ? decodeURIComponent(p.get('name')) : null;
  if (!url) return;
  nowPlayingText.textContent = name || url;
  currentUrl = url;
  startCascade(url);
}
setTimeout(restoreFromURL, 50);

// ── Layout edit (iOS jiggle) ──────────────────────────────────────────────────
let isEditing = false, longClickTimer;
[sidebarPanel, playerPanel].forEach(panel => {
  panel.addEventListener('mousedown', e => {
    if (e.target.closest('input,button,.channels,a,label')) return;
    longClickTimer = setTimeout(() => {
      isEditing = true;
      sidebarPanel.classList.add('jiggle');
      playerPanel.classList.add('jiggle');
    }, 700);
  });
  panel.addEventListener('mouseup',   () => clearTimeout(longClickTimer));
  panel.addEventListener('mouseleave',() => clearTimeout(longClickTimer));
});

moveTrigger.addEventListener('click', () => {
  if (!isEditing) return;
  mainGrid.classList.toggle('alt-layout');
  isEditing = false;
  sidebarPanel.classList.remove('jiggle');
  playerPanel.classList.remove('jiggle');
});

document.querySelector('.remove-badge').addEventListener('click', () => {
  sidebarPanel.style.display = 'none';
  mainGrid.style.gridTemplateColumns = '1fr';
  isEditing = false;
  sidebarPanel.classList.remove('jiggle');
  playerPanel.classList.remove('jiggle');
});

// ── Cast button ───────────────────────────────────────────────────────────────
castDeviceBtn.addEventListener('click', () => {
  castDeviceBtn.classList.toggle('casting');
  if (castDeviceBtn.classList.contains('casting')) {
    castDeviceBtn.innerHTML = '<span>⎋</span> Connecting…';
    setTimeout(() => { castDeviceBtn.innerHTML = '<span>⎋</span> Disconnect'; }, 2000);
  } else {
    castDeviceBtn.innerHTML = '<span>⎋</span> Cast';
  }
});

// ── Boot ──────────────────────────────────────────────────────────────────────
shaka.polyfill.installAll(); // pre-register Shaka polyfills early
loadCountryList();
</script>
