  <style>
    :root {
      /* Theme Strict Colors */
      --c-purple: #b82bd7;
      --c-sand: #f5d4a1;
      --c-pink: #f55fa3;
      --c-blue: #608bf3;
      --c-teal: #49f4e1;

      /* Liquid Glass Metrics */
      --lg-bg-color: rgba(255, 255, 255, 0.22);
      --lg-highlight: rgba(255, 255, 255, 0.75);
      --lg-text: #ffffff;
      --lg-text-dim: rgba(255, 255, 255, 0.65);
    }

    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
      font-family: 'Inter', sans-serif; 
      -webkit-font-smoothing: antialiased;
      user-select: none;
    }

    body { 
      display: flex; 
      flex-direction: column; 
      height: 100vh; 
      background: linear-gradient(135deg, var(--c-purple), var(--c-pink), var(--c-blue), var(--c-teal));
      background-size: 400% 400%;
      animation: fluid-bg 16s ease infinite alternate;
      color: var(--lg-text); 
      overflow: hidden;
      padding: 1.5rem;
      gap: 1.25rem;
    }

    @keyframes fluid-bg {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 50% 100%; }
    }

    /* System Main Interactive Grid Mesh */
    main { 
      display: grid; 
      grid-template-columns: 340px 1fr;
      grid-template-rows: auto 1fr;
      flex: 1; 
      min-height: 0; 
      gap: 1.5rem;
      transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
    }

    /* Alternate Configuration when Sidebar is dropped to bottom */
    main.alt-layout {
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr 180px;
    }

    /* Core Draggable Glass Module Blocks */
    .draggable-panel {
      position: relative;
      border-radius: 2rem;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      background: transparent;
      transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.3s ease;
    }

    header.draggable-panel { grid-column: 1 / -1; }
    #sidebarPanel { order: 1; }
    #playerPanel { order: 2; }

    main.alt-layout #sidebarPanel {
      order: 3;
    }
    main.alt-layout #sidebarPanel .sidebar-inner {
      flex-direction: row;
      align-items: center;
      flex-wrap: nowrap;
      overflow-x: auto;
    }
    main.alt-layout #sidebarPanel .channels {
      display: flex;
      flex-direction: row;
      gap: 0.5rem;
      height: auto;
      flex: 1;
      overflow-x: auto;
      overflow-y: hidden;
    }
    main.alt-layout #sidebarPanel .channel-item {
      margin-bottom: 0;
      white-space: nowrap;
      min-width: 160px;
    }
    main.alt-layout #sidebarPanel .sidebar-control-group {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    /* iOS Jiggle Shaking Mechanism Animation */
    .jiggle {
      animation: shakeNoise 0.28s linear infinite alternate;
      box-shadow: 0 15px 35px rgba(0,0,0,0.3);
      cursor: grab;
    }
    @keyframes shakeNoise {
      0% { transform: rotate(-1deg) translateY(0); }
      100% { transform: rotate(1deg) translateY(-1px); }
    }

    /* Edit Interaction Badges */
    .panel-action-btn {
      position: absolute;
      top: 0.75rem;
      width: 1.75rem;
      height: 1.75rem;
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: bold;
      color: white;
      border: 1px solid rgba(255,255,255,0.4);
      z-index: 10;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    .jiggle .panel-action-btn { display: flex; }
    
    .remove-badge {
      left: 0.75rem;
      background: var(--c-pink);
    }
    .move-badge {
      right: 0.75rem;
      background: var(--c-blue);
      cursor: move;
    }

    .sidebar-inner, .player-inner, .header-inner {
      position: relative;
      z-index: 3;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      height: 100%;

    }
    .header-inner {
      flex-direction: row;
      justify-content: space-between;

    /* Input & Interactive Layer Components */
    input { 
      width: 100%; 
      padding: 0.8rem 1rem; 
      border-radius: 1rem; 
      border: 1px solid rgba(255, 255, 255, 0.25);

    /* Tinted Real Liquid Glass Button Configuration */
    button.liquid-btn { 
      position: relative;

      padding: 0.85rem;

    button.liquid-btn:hover {

    button.liquid-btn:active {

    /* Scrolling Interface Engine */
    .channels { 
      flex: 1; 
      overflow-y: auto;

    .channel-item { 
      padding: 0.75rem 1rem;

    }
    .channel-item:hover { background: rgba(255, 255, 255, 0.15); }
    .channel-item.active { 
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid var(--c-teal);
    }

    /* Video Deck Components */
    .video-container {
      position: relative;
      width: 100%;
      flex: 1;
      min-height: 0;

    video { 
      width: 100%;

      background: #000000;

      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* Control Deck Sub-Layer */
    .player-controls-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }
    #nowPlaying {
      font-size: 1rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    #nowPlaying::before {
      content: '';
      width: 8px;
      height: 8px;
      background: var(--c-teal);
      border-radius: 50%;
    }

    /* Functional Streaming Accessories Container */
    .media-accessories {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    .accessory-btn {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      padding: 0.5rem 1rem;
      border-radius: 0.75rem;
      color: white;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: all 0.3s ease;
    }
    .accessory-btn:hover {
      background: rgba(255,255,255,0.25);
      transform: translateY(-1px);
    }
    .accessory-btn.casting {
      background: var(--c-blue);
      border-color: var(--c-teal);
      animation: castPulse 1.5s infinite alternate;
    }
    @keyframes castPulse {
      from { opacity: 0.8; }
      to { opacity: 1; filter: brightness(1.2); }
    }

    /* VLC Native Interface Fallback Block Container */
    .vlc-fallback-card {
      position: absolute;
      bottom: 2rem;
      right: 2rem;
      background: rgba(0, 0, 0, 0.85);
      border: 1px solid var(--c-pink);
      padding: 1.25rem;
      border-radius: 1.25rem;
      z-index: 20;
      display: none;
      flex-direction: column;
      gap: 0.75rem;
      max-width: 300px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.5);
      animation: fallbackSlideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes fallbackSlideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .vlc-fallback-card p {
      font-size: 0.8rem;
      color: var(--lg-text);
      line-height: 1.4;
    }
    .vlc-btn {
      background: var(--c-pink);
      border: none;
      padding: 0.5rem;
      border-radius: 0.5rem;
      color: white;
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
    }

    .status { font-size: 0.78rem; color: var(--c-sand); min-height: 1.2rem; }

    /* ========== SVG LAYER STRUCTURE GRAPHICS ENGINE ========== */
    .glass-filter { position: absolute; inset: 0; z-index: 0; backdrop-filter: blur(20px); filter: url(#lg-dist); isolation: isolate; }
    .glass-overlay { position: absolute; inset: 0; z-index: 1; background: var(--lg-bg-color); }
    .glass-specular { position: absolute; inset: 0; z-index: 2; border-radius: inherit; box-shadow: inset 1px 1px 0 var(--lg-highlight), inset 0 0 6px var(--lg-highlight); pointer-events: none; }
  </style>

  <script>
  //  if (/Android|iPhone|iPad|iPod|Windows Phone|Mobile/i.test(navigator.userAgent)) {
   // window.location.href = "/mobile/";

  // ── Deep-link: sync active channel to URL & restore on load ──
function updateURL(ch) {
  const params = new URLSearchParams(window.location.search);
  params.set('ch', encodeURIComponent(ch.url));
  params.set('name', encodeURIComponent(ch.name));
  history.replaceState(null, '', '?' + params.toString());
}

function restoreFromURL() {
  const params = new URLSearchParams(window.location.search);
  const url  = params.get('ch')   ? decodeURIComponent(params.get('ch'))   : null;
  const name = params.get('name') ? decodeURIComponent(params.get('name')) : null;
  if (!url) return;

  // Works in both versions (old uses nowPlayingEl differently)
  const npEl = document.getElementById('nowPlaying');
  const npText = document.getElementById('nowPlayingText');
  if (npText) npText.textContent = name || url;
  else if (npEl) npEl.textContent = 'Playing: ' + (name || url);

  // Use whichever play function exists
  if (typeof playStream === 'function') playStream(url);
  else if (typeof playChannel === 'function') {
    // Old version needs a fake channel object injected
    channels.push({ name: name || url, group: 'Shared Link', url });
    filteredChannels = channels.slice();
    activeIndex = channels.length - 1;
    renderChannels(filteredChannels);
    playChannel(activeIndex);
  }
}

// Patch into whichever pick function exists
const _pickChannel  = typeof pickChannel  !== 'undefined' ? pickChannel  : null;
const _playChannel  = typeof playChannel  !== 'undefined' ? playChannel  : null;

if (_pickChannel) {
  window.pickChannel = function(idx) {
    _pickChannel(idx);
    const ch = (typeof filtered !== 'undefined' ? filtered : filteredChannels)[idx];
    if (ch) updateURL(ch);
  };
}
if (_playChannel && !_pickChannel) {
  window.playChannel = function(idx) {
    _playChannel(idx);
    const ch = filteredChannels[idx];
    if (ch) updateURL(ch);
  };
}

// Run on page load — after a tick so page variables are ready
setTimeout(restoreFromURL, 0);
  </script>

<main id="mainGrid">

  <header id="headerPanel" class="draggable-panel">

          <button class="vlc-btn" style="background:transparent; border:1px solid rgba(255,255,255,0.2)" onclick="alert('Download VLC Media Player from your device store to stream external feeds directly.')">Install Guide</button>

<script>
  const mainGrid = document.getElementById("mainGrid");
  const sidebarPanel = document.getElementById("sidebarPanel");
  const playerPanel = document.getElementById("playerPanel");
  const moveTrigger = document.getElementById("moveTrigger");
  const castDeviceBtn = document.getElementById("castDeviceBtn");
  const vlcFallback = document.getElementById("vlcFallback");
  const vlcLaunchLink = document.getElementById("vlcLaunchLink");

  let isEditing = false;
  let longClickTimer;

  // iOS Style Layout Setup Activation Trigger Model
  [sidebarPanel, playerPanel].forEach(panel => {
    panel.addEventListener("mousedown", (e) => {
      if (e.target.closest('input, button, .channels, a')) return;
      longClickTimer = setTimeout(() => {
        isEditing = true;
        sidebarPanel.classList.add("jiggle");
        playerPanel.classList.add("jiggle");
      }, 700);
    });

    panel.addEventListener("mouseup", () => clearTimeout(longClickTimer));
    panel.addEventListener("mouseleave", () => clearTimeout(longClickTimer));
  });

  // Dynamic Component Swap Grid Re-ordering Engine
  moveTrigger.addEventListener("click", () => {
    if (!isEditing) return;
    mainGrid.classList.toggle("alt-layout");
    
    // Clean out edit mode variables upon conversion complete
    isEditing = false;
    sidebarPanel.classList.remove("jiggle");
    playerPanel.classList.remove("jiggle");
  });

  // Close Component Action Handler Layer
  document.querySelector(".remove-badge").addEventListener("click", () => {
    sidebarPanel.style.display = "none";
    mainGrid.style.gridTemplateColumns = "1fr";
    isEditing = false;
    sidebarPanel.classList.remove("jiggle");
    playerPanel.classList.remove("jiggle");
  });

  // Interactive Accessory Elements Animations Handlers
  castDeviceBtn.addEventListener("click", () => {
    castDeviceBtn.classList.toggle("casting");
    if(castDeviceBtn.classList.contains("casting")) {
      castDeviceBtn.innerHTML = "<span>⎋</span> Connecting Stage...";
      setTimeout(() => {
        castDeviceBtn.innerHTML = "<span>⎋</span> Disconnect Cast";
      }, 2000);
    } else {
      castDeviceBtn.innerHTML = "<span>⎋</span> Cast Stream";
    }
  });

  // Core IPTV Application Logic Implementation Framework
  const countryInput = document.getElementById("countryInput");
  const loadCountryBtn = document.getElementById("loadCountryBtn");
  const statusEl = document.getElementById("status");
  const channelListEl = document.getElementById("channelList");
  const videoEl = document.getElementById("video");
  const nowPlayingEl = document.getElementById("nowPlaying");
  const searchInput = document.getElementById("searchInput");

  let channels = [];
  let filteredChannels = [];
  let activeIndex = -1;
  let hls = null;
  let countryFiles = {}; 

  async function loadCountryList() {
    try {
      const res = await fetch("https://api.github.com/repos/iptv-org/iptv/contents/streams");
      const data = await res.json();
      data.forEach(file => {
        if (file.name.endsWith(".m3u")) {
          const code = file.name.replace(".m3u", "").toLowerCase();
          countryFiles[code] = code;
        }
      });
      setStatus("Global references indexed.");
    } catch (err) {
      setStatus("Indices synchronization failure.");
    }
  }

  function setStatus(msg) { statusEl.textContent = msg; }

  function parseM3U(text) {
    const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
    const result = [];
    let current = null;

    for (const line of lines) {
      if (line.startsWith("#EXTINF:")) {
        const info = line.substring(8);
        const [metaPart, ...nameParts] = info.split(",");
        const name = nameParts.join(",").trim();
        const meta = {};
        const attrRegex = /(\w+?)="(.*?)"/g;
        let m;
        while ((m = attrRegex.exec(metaPart)) !== null) { meta[m[1]] = m[2]; }

        current = {
          name: name || meta["tvg-name"] || "External Feed",
          group: meta["group-title"] || "General",
          url: ""
        };
      } else if (!line.startsWith("#") && current) {
        current.url = line;
        result.push(current);
        current = null;
      }
    }
    return result;
  }

  function renderChannels(list) {
    channelListEl.innerHTML = "";
    list.forEach((ch, index) => {
      const div = document.createElement("div");
      div.className = "channel-item" + (index === activeIndex ? " active" : "");
      div.innerHTML = `<strong>${ch.name}</strong><br><small>${ch.group}</small>`;
      div.onclick = () => playChannel(index);
      channelListEl.appendChild(div);
    });
  }

  function playChannel(index) {
    const ch = filteredChannels[index];
    if (!ch) return;

    activeIndex = index;
    renderChannels(filteredChannels);
    nowPlayingEl.textContent = "Playing: " + ch.name;
    vlcFallback.style.display = "none";

    if (hls) { hls.destroy(); hls = null; }
    videoEl.removeAttribute("src");
    videoEl.load();

    if (ch.url.includes(".m3u8")) {
      if (videoEl.canPlayType("application/vnd.apple.mpegurl")) {
        videoEl.src = ch.url;
        videoEl.play().catch(() => triggerDecoderFallback(ch.url));
      } else if (Hls.isSupported()) {
        hls = new Hls({ xhrSetup: (xhr) => { xhr.withCredentials = false; } });
        hls.loadSource(ch.url);
        hls.attachMedia(videoEl);
        hls.on(Hls.Events.ERROR, (event, data) => { if (data.fatal) triggerDecoderFallback(ch.url); });
      }
    } else {
      videoEl.src = ch.url;
      videoEl.play().catch(() => triggerDecoderFallback(ch.url));
    }
  }

  function triggerDecoderFallback(streamUrl) {
    setStatus("Decoder error on current layer framework.");
    vlcLaunchLink.href = "vlc://" + streamUrl;
    vlcFallback.style.display = "flex";
  }

  async function loadCountry() {
    const input = countryInput.value.trim().toLowerCase();
    if (!input) return setStatus("Specify index destination.");
    let code = countryFiles[input] || Object.keys(countryFiles).find(c => c.includes(input));
    if (!code) return setStatus("Destination signature unmapped.");

    setStatus("Handshaking list pipeline...");
    try {
      const res = await fetch(`https://raw.githubusercontent.com/iptv-org/iptv/master/streams/${code}.m3u`);
      const text = await res.text();
      channels = parseM3U(text);
      filteredChannels = channels.slice();
      renderChannels(filteredChannels);
      setStatus(`Mounted ${channels.length} stations.`);
    } catch (err) {
      setStatus("Pipeline loading breakdown.");
    }
  }

  loadCountryBtn.onclick = loadCountry;
  searchInput.oninput = () => {
    const q = searchInput.value.toLowerCase();
    filteredChannels = q ? channels.filter(ch => ch.name.toLowerCase().includes(q)) : channels.slice();
    renderChannels(filteredChannels);
  };

  loadCountryList();
</script>

</body>
</html>
